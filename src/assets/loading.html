<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小路光 AI — 載入中</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 40%, #1b2838 100%);
        font-family:
          'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #e0e0e0;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 520px;
      }

      .brand {
        margin-bottom: 32px;
      }

      .brand-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        animation: pulse 2s ease-in-out infinite;
      }

      .brand-name {
        font-size: 1.6rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 2px;
      }

      .brand-sub {
        font-size: 0.85rem;
        color: #8892a4;
        margin-top: 4px;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(0.97); }
      }

      .status-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 28px 32px;
        margin-bottom: 24px;
      }

      .spinner-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2.5px solid rgba(255, 255, 255, 0.1);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      h1 {
        font-size: 1.1rem;
        font-weight: 500;
        color: #ffffff;
      }

      .status {
        font-size: 0.85rem;
        color: #8892a4;
      }

      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
        text-align: left;
      }

      .feature {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 14px 16px;
      }

      .feature-icon {
        font-size: 18px;
        margin-bottom: 6px;
      }

      .feature-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: #c8ceda;
      }

      .feature-desc {
        font-size: 0.7rem;
        color: #6b7280;
        margin-top: 2px;
      }

      .info {
        font-size: 0.75rem;
        color: #4b5563;
        margin-top: 20px;
      }

      .error {
        color: #f87171;
        margin-top: 16px;
        padding: 10px 16px;
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.15);
        border-radius: 10px;
        display: none;
        font-size: 0.85rem;
      }

      .ready { color: #4ade80; }

      .footer {
        margin-top: 40px;
        font-size: 0.7rem;
        color: #374151;
      }

      .footer a {
        color: #4b5563;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="brand">
        <div class="brand-icon">&#x1F980;</div>
        <div class="brand-name">小路光 AI</div>
        <div class="brand-sub">XiaoLu AI Agent Platform</div>
      </div>

      <div class="status-card">
        <div class="spinner-row">
          <div class="spinner"></div>
          <h1 id="title">AI Agent 啟動中</h1>
        </div>
        <p class="status" id="status">正在啟動容器環境...</p>
      </div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">&#x1F916;</div>
          <div class="feature-title">智能客服</div>
          <div class="feature-desc">24/7 自動回覆</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#x1F4DA;</div>
          <div class="feature-title">知識庫</div>
          <div class="feature-desc">文件即時查詢</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#x1F512;</div>
          <div class="feature-title">私有部署</div>
          <div class="feature-desc">資料不外流</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#x26A1;</div>
          <div class="feature-title">即時回應</div>
          <div class="feature-desc">邊緣計算加速</div>
        </div>
      </div>

      <p class="error" id="error"></p>
      <p class="info">首次載入約需 1-2 分鐘，正在為您準備最佳體驗</p>

      <div class="footer">
        Powered by <a href="https://aiforseo.vip">小路光有限公司</a>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const errorEl = document.getElementById('error');
      let pollCount = 0;
      let consecutiveErrors = 0;
      const maxConsecutiveErrors = 5;

      async function checkStatus() {
        pollCount++;

        try {
          const response = await fetch('/api/status');
          const data = await response.json();
          consecutiveErrors = 0;

          if (data.ok && data.status === 'running') {
            statusEl.textContent = 'Gateway 就緒，驗證中...';
            try {
              const probeCtrl = new AbortController();
              const probeTimer = setTimeout(() => probeCtrl.abort(), 10000);
              const probeResp = await fetch(window.location.href, {
                signal: probeCtrl.signal,
                headers: { Accept: 'text/html' },
              });
              clearTimeout(probeTimer);
              const probeText = await probeResp.text();
              if (
                probeResp.ok &&
                probeText.length > 100 &&
                !probeText.includes('AI Agent 啟動中')
              ) {
                titleEl.innerHTML = '<span class="ready">準備完成</span>';
                statusEl.textContent = '正在跳轉...';
                document.querySelector('.spinner').style.display = 'none';
                setTimeout(() => { window.location.reload(); }, 300);
                return;
              }
            } catch {
              // Probe failed — keep polling
            }
            statusEl.textContent = 'Gateway 正在初始化...';
            setTimeout(checkStatus, 3000);
            return;
          }

          if (data.status === 'not_running') {
            statusEl.textContent = '容器啟動中...';
          } else if (data.status === 'not_responding') {
            statusEl.textContent = '容器已啟動，等待 Gateway...';
          } else {
            statusEl.textContent = '檢查狀態中... (' + pollCount + ')';
          }

          setTimeout(checkStatus, 2000);
        } catch (err) {
          consecutiveErrors++;

          if (consecutiveErrors >= maxConsecutiveErrors) {
            errorEl.textContent = '無法連線到伺服器，請重新整理頁面。';
            errorEl.style.display = 'block';
            statusEl.textContent = '連線中斷';
          } else {
            statusEl.textContent =
              '重試中... (' + consecutiveErrors + '/' + maxConsecutiveErrors + ')';
            setTimeout(checkStatus, 3000);
          }
        }
      }

      setTimeout(checkStatus, 1000);
    </script>
  </body>
</html>
